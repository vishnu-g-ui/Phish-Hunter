<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Password Strength Checker</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}
body{
background:#0f172a;
}
nav {
    width: 100%;
    padding: 1rem 5%;
    background: rgba(255, 255, 255, 0.05);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.logo {
    font-size: 30px;
    font-weight: 700;
    color: #38bdf8;
    letter-spacing: 1px;
    margin-right: 55px;
}
.nav-links {
    list-style: none;
    display: flex;
    gap: 2rem;
    border: 1px solid #38bdf8;
    padding: 10px;
    border-radius: 25px;
}
.nav-links li a {
    position: relative;
    font-size: 17px;
    font-weight: 500;
    text-decoration: none;
    color: #e2e8f0;
    transition: 0.3s;
}
.nav-links li a:hover {
    color: #38bdf8;
    text-shadow: 0 0 10px #38bdf8;
    padding: 8px;
    border-bottom: 1px solid #38bdf8;
    border-radius: 20px;
}
.login-btn{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#16a34a;
    color:white;
    cursor:pointer;
    transition:0.3s;
}
.login-btn:hover{
    box-shadow:0 0 15px #16a34a;
}
.container{
    background:#1e293b;
    padding:40px;
    border-radius:12px;
    width:350px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    margin:100px auto;
}
h2{
    color:white;
    margin-bottom:20px;
}
input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:20px;
    margin-bottom:15px;
    font-size:16px;
    background:#0f172a;
    border:1px solid black;
    color:white;
}
button.check-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:#16a34a;
    color:white;
    font-size:16px;
    cursor:pointer;
}
button.check-btn:hover{
    box-shadow:0 0 15px darkgreen;
}
.strength{  
    width:100%;
    height:10px;
    background:#334155;
    border-radius:10px;
    margin-top:15px;
    overflow:hidden;
}
#strengthBar{
    height:100%;
    width:0%;
    background:red;
    transition:0.4s;
}

#result{
    margin-top:15px;
    color:white;
    font-size:14px;
    text-align:left;
}
</style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">PhishHunter</div>

            <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Attacks</a></li>
            <li><a href="#">Portfolio</a></li>
            <li><a href="#">About</a></li>
        </ul>
          <button class="login-btn">Login</button>
    </nav>
        <div class="container">
        <h2>Password Strength Checker</h2>

    <form onsubmit="checkPassword(event)">
    <input type="password" id="password" placeholder="Enter your password">
    <button class="check-btn" type="submit">Check Password</button>

</form>

    <div class="strength">
        <div id="strengthBar"></div>
        </div>
        <p id="result"></p>
    </div>

<script>

function checkPassword(event){
event.preventDefault();
let password=document.getElementById("password").value;
let hasUpper=false;
let hasLower=false;
let hasDigit=false;
let hasSpecial=false;
let suggestions=[];
for(let ch of password){
if(ch>='A' && ch<='Z'){hasUpper=true;}
else if(ch>='a' && ch<='z'){hasLower=true;}
else if(ch>='0' && ch<='9'){hasDigit=true;}
else{hasSpecial=true;}

}

if(password.length<8){
suggestions.push("Password should be at least 8 characters");
}

if(!hasUpper){
suggestions.push("Add an uppercase letter (A-Z)");
}

if(!hasLower){
suggestions.push("Add a lowercase letter (a-z)");
}

if(!hasDigit){
suggestions.push("Add a number (0-9)");
}

if(!hasSpecial){
suggestions.push("Add a special character (@,#,$ etc)");
}

let result=document.getElementById("result");
let bar=document.getElementById("strengthBar");

let strength=0;

if(password.length>=8) strength++;
if(hasUpper) strength++;
if(hasLower) strength++;
if(hasDigit) strength++;
if(hasSpecial) strength++;

if(strength<=2){
bar.style.width="33%";
bar.style.background="red";
result.innerHTML="❌ Weak Password<br>"+suggestions.join("<br>");
}

else if(strength<=4){
bar.style.width="66%";
bar.style.background="orange";
result.innerHTML="⚠ Medium Password<br>"+suggestions.join("<br>");
}

else{
bar.style.width="100%";
bar.style.background="limegreen";
result.innerHTML="✅ Strong Password";
}
}
</script>

</body>
</html>
