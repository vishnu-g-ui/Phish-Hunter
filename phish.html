<!-- MAIN BODY -->
<div class="main-container">
    <h2>Phishing Website Detector</h2>
        <div class="phish-search">
            <input type="text" id="urlInput" placeholder="Enter Website URL">
            <button onclick="checkURL()">Check</button>
            <p id="result"></p>
            <ul id="reasons"></ul>
        </div>
</div>
<script>
    function checkURL(){

let url = document.getElementById("urlInput").value;

let suspiciousWords = ["-login", "-verify", "-bank", "-secure", "-account", "-update"];

let score = 0;
let reasons = [];

let result = document.getElementById("result");
let reasonList = document.getElementById("reasons");

reasonList.innerHTML = "";

// URL length check
if(url.length > 30){
    score++;
    reasons.push("URL is too long, please enter a valid URL");
}

// Protocol check
if(url.startsWith("https://")){
    reasons.push("Website is using HTTPS (secure)");
}
else if(url.startsWith("http://")){
    score++;
    reasons.push("Website is using HTTP (not secure)");
}
else{
    score++;
    reasons.push("Invalid URL format");
}

// Suspicious word check
for(let word of suspiciousWords){
    if(url.includes(word)){
        score++;
        reasons.push("Suspicious word detected: " + word);
    }
}

// RESULT
if(url.startsWith("https://") && score < 2){
    result.innerText = "✅ Website looks Safe";
    result.className = "safe show";
}
else if(url.startsWith("http://")){
    result.innerText = "⚠️ Website is Not Safe";
    result.className = "danger show";
}
else{
    result.innerText = "⚠️ Invalid URL";
    result.className = "danger show";
}

// Show reasons
for(let r of reasons){
    let li = document.createElement("li");
    li.innerText = r;
    reasonList.appendChild(li);
}

}

// ENTER KEY SUPPORT
document.getElementById("urlInput").addEventListener("keypress", function(event){

if(event.key === "Enter"){
    event.preventDefault();
    checkURL();
}

});

</script>
</body>
